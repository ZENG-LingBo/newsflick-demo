<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffe9e0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NewsFlick — Demo</title>
<link rel="icon" href="assets/img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Inter:wght@100..900&family=Noto+Sans+HK:wght@300..900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#c9ccca;font-family:'Inter','Noto Sans HK',-apple-system,system-ui,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:20px;gap:20px}
.device{position:relative;width:375px;height:812px;background:#e7eae9;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.35);border-radius:40px;flex:none}
.device iframe{position:absolute;inset:0;width:375px;height:812px;border:0;background:transparent}
#feed{background:#e7eae9}
#story{transform:translateX(100%);transition:transform .34s cubic-bezier(.4,0,.2,1);z-index:2;background:#e7eae9}
#story.on{transform:translateX(0)}
.sheet-layer{position:absolute;inset:0;z-index:5;pointer-events:none}
.sheet-layer.on{pointer-events:auto}
.sheet-layer iframe{transform:translateY(100%);transition:transform .36s cubic-bezier(.4,0,.2,1)}
.sheet-layer.on iframe{transform:translateY(0)}

/* ---- opening screen ---- */
.splash{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;
  background:linear-gradient(180deg,#ffe9e0 0%,#ffd3c3 100%);
  transition:transform .5s cubic-bezier(.5,0,.2,1),opacity .5s ease}
.splash.off{transform:translateY(-102%);opacity:.4;pointer-events:none}
.splash .sun{position:absolute;top:34%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:300px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#ffab6e 0%,#ffab6e 38%,rgba(255,171,110,0) 74%)}
.splash .inner{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:32px 28px calc(40px + env(safe-area-inset-bottom))}
.splash img{width:64px;height:64px;margin-bottom:6px}
.splash h1{font-family:'Space Grotesk','Noto Sans HK',sans-serif;font-weight:700;font-size:40px;
  line-height:44px;color:#272a27;letter-spacing:-.02em}
.splash .tag{font-size:15px;line-height:22px;color:#61443a;text-align:center;max-width:270px}
.splash .tag b{display:block;color:#272a27;font-weight:600}
.splash .langs{margin-top:38px;display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.langbig{display:flex;align-items:center;justify-content:space-between;width:100%;
  background:#fff;border:1px solid rgba(67,71,66,.12);border-radius:999px;padding:16px 22px;
  font-family:'Space Grotesk','Noto Sans HK',sans-serif;font-weight:600;font-size:17px;color:#1d201d;
  cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.08);transition:transform .15s ease}
.langbig:active{transform:scale(.97)}
.langbig .arr{color:#800080;font-weight:700}
.langbig--zh{background:#800080;border-color:transparent;color:#fff}
.langbig--zh .arr{color:#c9fa85}
.splash .foot{position:relative;text-align:center;font-size:11.5px;color:#8a6a5c;
  padding-bottom:calc(14px + env(safe-area-inset-bottom))}

/* ---- desktop side rail ---- */
.rail{display:flex;flex-direction:column;gap:12px;align-items:flex-start}
.rail .brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.rail .brand img{width:36px;height:36px;display:block}
.rail .brand span{font-weight:700;font-size:20px;color:#272a27;letter-spacing:-.02em;
  font-family:'Space Grotesk',sans-serif}
.rail p{font-size:13px;line-height:18px;color:#616460;max-width:200px}
.langbtn{display:flex;border:1px solid rgba(67,71,66,.25);border-radius:999px;overflow:hidden;cursor:pointer;user-select:none}
.langbtn span{padding:7px 16px;font-size:14px;font-weight:600;color:#616460;background:transparent}
.langbtn span.on{background:#800080;color:#fff}

@media (max-width:820px){
  body{padding:0;gap:0}
  .rail{display:none}
  .device{width:100vw;height:100dvh;border-radius:0;box-shadow:none}
  .device iframe{width:100vw;height:100dvh}
}
</style>
</head>
<body>
<div class="device">
  <iframe id="feed" title="feed"></iframe>
  <iframe id="story" title="story"></iframe>
  <div class="sheet-layer" id="layer-confidence"><iframe id="confidence" title="confidence"></iframe></div>
  <div class="sheet-layer" id="layer-pulse"><iframe id="pulse" title="pulse"></iframe></div>
  <div class="splash" id="splash">
    <div class="sun"></div>
    <div class="inner">
      <img src="assets/img/logo.png" alt="">
      <h1>NewsFlick</h1>
      <p class="tag"><b>A calmer way to follow the news.</b>更冷靜的看新聞方式。</p>
      <div class="langs">
        <button class="langbig" type="button" data-lang="en">English <span class="arr">→</span></button>
        <button class="langbig langbig--zh" type="button" data-lang="zh">中文（香港） <span class="arr">→</span></button>
      </div>
    </div>
    <p class="foot">Concept demo · 概念示範</p>
  </div>
</div>
<div class="rail">
  <div class="brand"><img src="assets/img/logo.png" alt=""><span>NewsFlick</span></div>
  <p id="railnote">A calmer way to follow the news — tap a story, check the confidence signal, feel the pulse.</p>
  <div class="langbtn" id="langbtn" role="group" aria-label="Language">
    <span data-lang="en">EN</span><span data-lang="zh">中</span>
  </div>
</div>
<script>
(function(){
  var LANGS={en:"en",zh:"zh"};
  var stored=localStorage.getItem("nf-lang");
  var lang=LANGS[stored] ? stored : (/^zh/i.test(navigator.language||"")?"zh":"en");

  var feedFr=document.getElementById("feed"), storyFr=document.getElementById("story");
  var splash=document.getElementById("splash");
  var curStory=null, sheetLoaded={confidence:null,pulse:null}, booted=false;

  function page(name){ return lang+"/"+name+".html"; }

  function setLangUI(){
    document.querySelectorAll("#langbtn span").forEach(function(s){
      s.classList.toggle("on", s.dataset.lang===lang);
    });
    document.documentElement.lang = lang==="zh"?"zh-Hant-HK":"en";
    document.getElementById("railnote").textContent = lang==="zh"
      ? "更冷靜的看新聞方式——點開報道、查可信度、看輿論脈搏。"
      : "A calmer way to follow the news — tap a story, check the confidence signal, feel the pulse.";
  }

  function boot(){
    if(booted) return; booted=true;
    setLangUI();
    feedFr.src=page("feed");
  }
  function dismissSplash(){ splash.classList.add("off"); }

  function openStory(id){
    if(curStory!==id){ storyFr.src=page(id); curStory=id;
      sheetLoaded.confidence=null; sheetLoaded.pulse=null; }
    requestAnimationFrame(function(){ storyFr.classList.add("on"); });
    if(curStory) history.replaceState(null,"","#"+curStory);
  }
  function back(){ storyFr.classList.remove("on");
    history.replaceState(null,"",location.pathname+location.search); }
  function openSheet(name){
    var fr=document.getElementById(name), sid=curStory||"s01";
    if(sheetLoaded[name]!==sid+lang){ fr.src=page(name+"-"+sid); sheetLoaded[name]=sid+lang; }
    requestAnimationFrame(function(){ document.getElementById("layer-"+name).classList.add("on"); });
  }
  function closeSheet(name){ document.getElementById("layer-"+name).classList.remove("on"); }

  window.addEventListener("message",function(e){
    var m=e.data||{};
    if(m.nf==="open-story") openStory(m.id||"s01");
    else if(m.nf==="back") back();
    else if(m.nf==="open") openSheet(m.sheet);
    else if(m.nf==="close") closeSheet(m.sheet);
  });

  function switchLang(l){
    if(!LANGS[l]) return;
    lang=l; localStorage.setItem("nf-lang",l); setLangUI();
    if(!booted){ boot(); return; }
    feedFr.src=page("feed");
    if(curStory){ storyFr.src=page(curStory); }
    closeSheet("confidence"); closeSheet("pulse");
    sheetLoaded.confidence=null; sheetLoaded.pulse=null;
  }

  /* opening screen: pick language, then enter */
  splash.addEventListener("click",function(e){
    var b=e.target.closest("[data-lang]"); if(!b) return;
    switchLang(b.dataset.lang);
    dismissSplash();
  });
  document.getElementById("langbtn").addEventListener("click",function(e){
    var t=e.target.closest("[data-lang]"); if(!t||t.dataset.lang===lang) return;
    switchLang(t.dataset.lang);
  });

  /* deep link skips the opening screen; plain visits get it */
  var h=(location.hash||"").replace("#","");
  if(/^s0[1-4]$/.test(h)){
    dismissSplash(); boot();
    storyFr.src=page(h); curStory=h;
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ storyFr.classList.add("on"); }); });
  } else {
    boot(); /* feed loads behind the splash so entry is instant */
  }
})();
</script>
</body>
</html>
