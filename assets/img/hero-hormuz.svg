  <path d="M40 196 C120 176 190 196 236 188 C282 180 330 196 372 186" fill="none" stroke="#8fb3cf" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="8 7"/>
  <path d="M30 214 C120 200 200 214 246 204" fill="none" stroke="#8fb3cf" stroke-opacity="0.28" stroke-width="2" stroke-dasharray="8 7"/>
  <!-- strike points -->
  <g fill="#ff9a85">
