      <stop offset="0.45" stop-color="#c2452f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#c2452f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
