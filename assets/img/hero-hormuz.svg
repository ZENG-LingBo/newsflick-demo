    <circle cx="196" cy="120" r="3.5" opacity="0.8"/>
    <circle cx="120" cy="118" r="3" opacity="0.7"/>
    <circle cx="252" cy="150" r="4" opacity="0.9"/>
    <circle cx="292" cy="104" r="3" opacity="0.65"/>
